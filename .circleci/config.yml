# .circleci/config.yml (CircleCI 2.1)
version: 2.1

executors:
  docker-dind:
    machine:
      image: ubuntu-2404:current
      docker_layer_caching: false
    environment:
      DOCKER_BUILDKIT: 1
      COMPOSE_DOCKER_CLI_BUILD: 1
      IMAGE_NAME: docker.io/$DOCKERHUB_USER/comfyui-qwen-template

jobs:
  build_and_push:
    executor: docker-dind
    parameters:
      tag_name:
        type: string
      channel:
        type: string   # "stable" or "experimental"
    steps:
      - checkout

      - run:
          name: Log in to Docker Hub
          command: |
            echo "$DOCKERHUB_PAT" | docker login -u "$DOCKERHUB_USER" --password-stdin

      - run:
          name: Validate tag
          command: |
            if [ -z "<< parameters.tag_name >>" ]; then
              echo "ERROR: tag_name is empty. This job must be triggered by a Git tag."
              exit 1
            fi

      - run:
          name: Check for CRLF line endings
          command: |
            if grep -rlI $'\r' ./; then
              echo "ERROR: CRLF line endings detected! Convert all scripts to LF before building."
              exit 1
            else
              echo "✅ No CRLF detected. All files are LF."
            fi

      - run:
          name: Build & push image
          command: |
            TAG="<< parameters.tag_name >>"
            IMG="$IMAGE_NAME"

            echo "Building ${IMG}:${TAG}"
            docker build --progress=plain -t "${IMG}:${TAG}" .
            docker push "${IMG}:${TAG}"

            if [ "<< parameters.channel >>" = "stable" ]; then
              docker tag "${IMG}:${TAG}" "${IMG}:latest"
              docker push "${IMG}:latest"
            fi

            if [ "<< parameters.channel >>" = "experimental" ]; then
              docker tag "${IMG}:${TAG}" "${IMG}:experimental"
              docker push "${IMG}:experimental"
            fi

workflows:
  version: 2

  release_builds:
    jobs:
      # Stable releases: v1.2.3
      - build_and_push:
          tag_name: << pipeline.git.tag >>
          channel: "stable"
          filters:
            tags:
              only: /^v[0-9]+\.[0-9]+\.[0-9]+$/
            branches:
              ignore: /.*/

      # Experimental releases: v1.2.3-e
      - build_and_push:
          tag_name: << pipeline.git.tag >>
          channel: "experimental"
          filters:
            tags:
              only: /^v[0-9]+\.[0-9]+\.[0-9]+-e$/
            branches:
              ignore: /.*/