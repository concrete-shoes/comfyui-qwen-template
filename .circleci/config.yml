# .circleci/config.yml (CircleCI 2.1)
version: 2.1

executors:
  docker-dind:
    machine:
      image: ubuntu-2404:current
      docker_layer_caching: false
    environment:
      DOCKER_BUILDKIT: 1
      COMPOSE_DOCKER_CLI_BUILD: 1

jobs:
  build_and_push:
    executor: docker-dind
    parameters:
      tag_name:
        type: string
      push_latest:
        type: boolean
        default: true
      push_experimental:
        type: boolean
        default: false
    steps:
      - checkout

      - run:
          name: Log in to Docker Hub
          command: |
            echo "$DOCKERHUB_PAT" | docker login -u "$DOCKERHUB_USER" --password-stdin

      - run:
          name: Check for CRLF line endings
          command: |
            if grep -rlI $'\r' ./; then
              echo "ERROR: CRLF line endings detected! Convert all scripts to LF before building."
              exit 1
            else
              echo "✅ No CRLF detected. All files are LF."
            fi

      - run:
          name: Build & push image
          command: |
            TAG="<< parameters.tag_name >>"
            IMG="docker.io/$DOCKERHUB_USER/comfyui-qwen-template"

            echo "Building and pushing ${IMG}:${TAG} ..."
            docker build --progress=plain -t "${IMG}:${TAG}" .
            docker push "${IMG}:${TAG}"

            # Push latest if requested (main tags)
            if << parameters.push_latest >>; then
              echo "Tagging and pushing ${IMG}:latest ..."
              docker tag "${IMG}:${TAG}" "${IMG}:latest"
              docker push "${IMG}:latest"
            fi

            # Push experimental tag if requested
            if << parameters.push_experimental >>; then
              echo "Tagging and pushing ${IMG}:experimental ..."
              docker tag "${IMG}:${TAG}" "${IMG}:experimental"
              docker push "${IMG}:experimental"
            fi

workflows:
  version: 2
  build_on_tag:
    jobs:
      # Main release tags vX.Y.Z
      - build_and_push:
          tag_name: << pipeline.git.tag >>
          push_latest: true
          filters:
            tags:
              only: /^v[0-9]+(\.[0-9]+)*$/   # Only Git tags like v1, v1.2, v1.2.3
            branches:
              ignore: /.*/

      # Experimental tags v0.0.0-e (from experimental branch)
      - build_and_push:
          tag_name: << pipeline.git.tag >>
          push_latest: false
          push_experimental: true
          filters:
            tags:
              only: /^v0\.0\.0-.*$/   # Example: v0.0.0-e, v0.0.0-alpha
            branches:
              only: experimental